name: Publish Backend Image

on:
  push:
    branches:
      # - main
      - master
      # - cloud_flare_test_clean
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/video-subtitle-stitch-backend
  HF_MODEL_REPO: Systran/faster-whisper-small
  MODEL_OUTPUT_DIR: build-artifacts/models/faster-whisper-small

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache downloaded model
        uses: actions/cache@v4
        with:
          path: build-artifacts/models
          key: model-${{ env.HF_MODEL_REPO }}-v1

      - name: Install model download dependency
        run: python -m pip install --upgrade pip huggingface_hub

      - name: Download small model into build context
        env:
          HF_MODEL_REPO: ${{ env.HF_MODEL_REPO }}
          MODEL_OUTPUT_DIR: ${{ env.MODEL_OUTPUT_DIR }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HUGGINGFACE_HUB_TOKEN }}
        run: python scripts/download_hf_model.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
